{% extends "base.html" %}
{% block title %}{{ 'Edit assignment' if mode == 'edit' else 'New assignment' }} — Classroom Ledger{% endblock %}
{% block content %}

<div class="page-header">
  <h1>{{ 'Edit assignment' if mode == 'edit' else 'New assignment' }}</h1>
  <div class="lede">Set the brief and a deadline for submissions.</div>
</div>

<div class="card" style="max-width: 620px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ assignment.title if assignment else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description / instructions</label>
        <textarea name="description" class="form-control" rows="4">{{ assignment.description if assignment else '' }}</textarea>
      </div>
      <div class="row g-3">
        <div class="col-sm-7">
          <label class="form-label">Deadline</label>
          <input type="datetime-local" name="deadline" class="form-control"
                 value="{{ assignment.deadline.strftime('%Y-%m-%dT%H:%M') if assignment else '' }}" required>
        </div>
        <div class="col-sm-5">
          <label class="form-label">Max score</label>
          <input type="number" name="max_score" class="form-control" min="1"
                 value="{{ assignment.max_score if assignment else 100 }}">
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{{ 'Save changes' if mode == 'edit' else 'Post assignment' }}</button>
        <a href="{{ url_for('admin.assignments') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
