{% extends "base.html" %}
{% block title %}New session — Classroom Ledger{% endblock %}
{% block content %}

<div class="page-header">
  <h1>New class session</h1>
  <div class="lede">Create today's session, then mark who attended.</div>
</div>

<div class="card" style="max-width: 560px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Session title</label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Week 4 — Functions &amp; Scope" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" value="{{ today }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Notes <span class="text-muted">(optional)</span></label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Create &amp; mark attendance</button>
        <a href="{{ url_for('admin.attendance_sessions') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
