{% extends "base.html" %}
{% block title %}{{ 'Edit link' if mode == 'edit' else 'Add a class link' }} — Classroom Ledger{% endblock %}
{% block content %}

<div class="page-header">
  <h1>{{ 'Edit link' if mode == 'edit' else 'Add a class link' }}</h1>
  <div class="lede">Share a recording, live session or resource with the class.</div>
</div>

<div class="card" style="max-width: 560px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ link.title if link else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">URL</label>
        <input type="url" name="url" class="form-control" placeholder="https://..." value="{{ link.url if link else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description <span class="text-muted">(optional)</span></label>
        <textarea name="description" class="form-control" rows="3">{{ link.description if link else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ 'Save changes' if mode == 'edit' else 'Publish link' }}</button>
        <a href="{{ url_for('admin.links') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
